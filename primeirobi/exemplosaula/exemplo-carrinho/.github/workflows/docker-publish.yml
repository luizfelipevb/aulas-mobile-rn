name: Deploy do Exemplo Carrinho para o Docker Hub

# Aciona o robô toda vez que fizermos push na branch main
on:
  push:
    branches:
      - main
      - master
    paths:
      - 'primeirobi/exemplosaula/exemplo-carrinho/**'

jobs:
  build-e-push:
    runs-on: ubuntu-latest # O computador que o robô vai usar

    steps:
      # Passo 1: O robô baixa o seu código
      - name: Checkout do código
        uses: actions/checkout@v4

      # Passo 2: O robô faz login no Docker Hub usando seus Secrets
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Passo 3: O robô prepara o ambiente para o Build
      - name: Configurar o Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Passo 4: O robô executa o Build e faz o Push automaticamente
      - name: Build e Push da Imagem
        uses: docker/build-push-action@v5
        with:
          context: ./primeirobi/exemplosaula/exemplo-carrinho # Caminho correto do projeto
          file: ./primeirobi/exemplosaula/exemplo-carrinho/Dockerfile # Caminho do Dockerfile
          push: true # Envia para o registry
          # Mude "seu-usuario" para o seu usuário real abaixo!
          tags: seu-usuario/exemplo-carrinho:latest